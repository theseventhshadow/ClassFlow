services:
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  academic-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: academic_db
      POSTGRES_USER: academic_user
      POSTGRES_PASSWORD: academic_pass
    volumes:
      - academic-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academic_user -d academic_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  assistance-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: assistance_db
      POSTGRES_USER: assistance_user
      POSTGRES_PASSWORD: assistance_pass
    volumes:
      - assistance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistance_user -d assistance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  message-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: message_db
      POSTGRES_USER: message_user
      POSTGRES_PASSWORD: message_pass
    volumes:
      - message-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U message_user -d message_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  notification-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  api-gateway:
    build: ./api-gateway
    image: api-gateway:local
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - bff
      - ms-auth
      - ms-academic
      - ms-assistance
      - ms-message
      - ms-notification
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  bff:
    build: ./bff
    image: bff:local
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - ms-auth
      - ms-academic
      - ms-assistance
      - ms-message
      - ms-notification
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  ms-auth:
    build: ./ms-auth
    image: ms-auth:local
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  ms-academic:
    build: ./ms-academic
    image: ms-academic:local
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      academic-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  ms-assistance:
    build: ./ms-assistance
    image: ms-assistance:local
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      assistance-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  ms-message:
    build: ./ms-message
    image: ms-message:local
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      message-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  ms-notification:
    build: ./ms-notification
    image: ms-notification:local
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      notification-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classflow-back-net

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    image: classflow-frontend:local
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - classflow-back-net

networks:
  classflow-back-net:
    name: classflow-back-net
    driver: bridge

volumes:
  auth-postgres-data:
  academic-postgres-data:
  assistance-postgres-data:
  message-postgres-data:
  notification-postgres-data: