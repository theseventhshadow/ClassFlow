server:
  port: 8080

spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      routes:
        # BFF Service
        - id: bff-service
          uri: http://bff:8086
          predicates:
            - Path=/api/bff/**
          filters:
            - StripPrefix=0

        # Auth Service
        - id: auth-service
          uri: http://auth:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
        
        # Academic Service (Courses)
        - id: academic-service-courses
          uri: http://academic:8082
          predicates:
            - Path=/api/courses/**,/api/subjects/**,/api/evaluations/**,/api/grades/**
          filters:
            - StripPrefix=0
        
        # Asistencia Service
        - id: asistencia-service
          uri: http://assistance:8083
          predicates:
            - Path=/api/attendance/**,/api/annotations/**
          filters:
            - StripPrefix=0
        
        # Mensajeria Service
        - id: mensajeria-service
          uri: http://message:8084
          predicates:
            - Path=/api/messages/**,/api/announcements/**
          filters:
            - StripPrefix=0
        
        # Notificaciones Service
        - id: notificaciones-service
          uri: http://notification:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# Logging
logging:
  level:
    gateway_service: DEBUG
    org.springframework.cloud.gateway: TRACE