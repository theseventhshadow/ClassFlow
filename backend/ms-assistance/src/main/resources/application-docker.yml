spring:
  datasource:
    url: jdbc:postgresql://assistance-db:5432/assistance_db
    driver-class-name: org.postgresql.Driver
    username: assistance_user
    password: assistance_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    defer-datasource-initialization: false
  flyway:
    locations: classpath:db/migration
    enabled: true
    baseline-on-migrate: false
    out-of-order: false
    encoding: UTF-8
  h2:
    console:
      enabled: false

server:
  port: 8083