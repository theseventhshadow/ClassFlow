server:
  port: 8086

spring:
  application:
    name: bff-service

services:
  auth:
    base-url: http://auth:8081
  academic:
    base-url: http://academic:8082
  assistance:
    base-url: http://assistance:8083
  message:
    base-url: http://message:8084
  notification:
    base-url: http://notification:8085

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
