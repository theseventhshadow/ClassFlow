apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-assistance
  namespace: classflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-assistance
  template:
    metadata:
      labels:
        app: ms-assistance
    spec:
      containers:
        - name: ms-assistance
          image: ms-assistance:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: classflow-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ms-assistance
  namespace: classflow
spec:
  selector:
    app: ms-assistance
  ports:
    - port: 8083
      targetPort: 8083
