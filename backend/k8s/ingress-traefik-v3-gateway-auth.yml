# Rutas protegidas del API Gateway con autenticación JWT — Traefik v3
# Usar este archivo si tu cluster tiene Traefik v3 instalado.
# NO aplicar junto con ingress-traefik-v2-gateway.yml
#
# Verificar versión: kubectl exec -n traefik deploy/traefik -- traefik version
#
# Flujo de autenticación:
#   Request → Traefik → ForwardAuth → ms-auth /api/auth/validate
#                                     ↓ 200 OK → continúa al api-gateway
#                                     ↓ 401    → rechaza la petición

# Middleware: valida el JWT contra ms-auth antes de enrutar
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-auth
  namespace: classflow
spec:
  forwardAuth:
    address: http://ms-auth.classflow.svc.cluster.local:8081/api/auth/validate
    authResponseHeaders:
      - X-User-Id
      - X-User-Role
    trustForwardHeader: true
---
# Rutas con prioridad: public primero (priority alto), protegidas después
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: classflow-api-gateway-v3
  namespace: classflow
spec:
  entryPoints:
    - web
  routes:
    # Endpoints públicos — sin middleware de auth
    - match: Host(`classflow.local`) && (PathPrefix(`/api/auth/login`) || PathPrefix(`/api/auth/register`))
      kind: Rule
      priority: 20
      services:
        - name: api-gateway
          port: 8080

    # Todos los demás endpoints — requieren JWT válido
    - match: Host(`classflow.local`) && PathPrefix(`/api`)
      kind: Rule
      priority: 10
      middlewares:
        - name: jwt-auth
      services:
        - name: api-gateway
          port: 8080
