server.port=8085
spring.application.name=notificaciones-service

spring.datasource.url=jdbc:h2:mem:notificaciones_db;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false

spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=false

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

logging.level.notificaciones_service=WARN
logging.level.org.springframework.boot.test.context=WARN
